name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: python3 manage.py check
        working-directory: shopur
      - run: python3 manage.py makemigrations --check --dry-run
        working-directory: shopur

  lint-project:
    runs-on: ubuntu-latest
    needs: build-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p artifacts
          flake8 . --output-file=artifacts/flake8-report.txt || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: artifacts/flake8-report.txt

  generate-api-schema:
    runs-on: ubuntu-latest
    needs: lint-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p artifacts
          python3 manage.py spectacular --file ../artifacts/schema.yml
        working-directory: shopur
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-schema
          path: artifacts/schema.yml

  security-scan:
    runs-on: ubuntu-latest
    needs: generate-api-schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p artifacts
          bandit -r . -f txt -o artifacts/bandit-report.txt || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: artifacts/bandit-report.txt
