name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p ../artifacts
          python3 manage.py check > ../artifacts/build-check.txt 2>&1
        working-directory: shopur
      - run: |
          python3 manage.py makemigrations --check --dry-run > ../artifacts/migrations-check.txt 2>&1
        working-directory: shopur
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: |
            artifacts/build-check.txt
            artifacts/migrations-check.txt

  lint-project:
    runs-on: ubuntu-latest
    needs: build-project
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p artifacts
          flake8 . > artifacts/flake8-report.txt 2>&1 || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: artifacts/flake8-report.txt

  generate-api-schema:
    runs-on: ubuntu-latest
    needs: lint-project
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p ../artifacts
          python3 manage.py spectacular --file ../artifacts/schema.yml
        working-directory: shopur
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-schema
          path: artifacts/schema.yml

  security-scan:
    runs-on: ubuntu-latest
    needs: generate-api-schema
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r shopur/requirements.txt
      - run: |
          mkdir -p artifacts
          bandit -r . -f txt > artifacts/bandit-report.txt 2>&1 || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: artifacts/bandit-report.txt
