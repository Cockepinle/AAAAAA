{% extends 'base.html' %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<div class="container" style="max-width:520px">
  <div class="card">
    <div class="card-body">
      <h1 class="h5 mb-3">Восстановление пароля</h1>
      <p class="text-muted">Введите email, на него придет ссылка для сброса пароля.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.email.errors }}
        <div class="mb-3">
          <label class="form-label">Email</label>
          {{ form.email }}
        </div>
        <button class="btn btn-gold" type="submit">Отправить ссылку</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
