version: '3.8'
services:
  grafana:
    image: grafana/grafana:latest
    container_name: my-grafana
    user: root
    ports:
      - "3000:3000"
    volumes:
      - ./my-grafana-data:/var/lib/grafana/
      - ./my-grafana-config:/etc/grafana/provisioning/
    hostname: my-grafana
    restart: always
    environment:
      - TZ=Europe/Moscow
    networks:
      - monitoring_system

  prometheus:
    image: prom/prometheus:latest
    container_name: my-prometheus
    hostname: my-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9092:9090"
    restart: always
    environment:
      - TZ=Europe/Moscow
    networks:
      - monitoring_system

networks:
  monitoring_system:
    external: true