image: python:3.11

stages:
  - build
  - lint
  - api
  - security

before_script:
  - pip install -r requirements.txt

build-project:
  stage: build
  script:
    - cd shopur
    - python3 manage.py check
    - python3 manage.py makemigrations --check --dry-run

lint-project:
  stage: lint
  script:
    - flake8 . --output-file=flake8-report.txt
  artifacts:
    paths:
      - flake8-report.txt
    when: always

generate-api-schema:
  stage: api
  script:
    - cd shopur
    - python3 manage.py spectacular --file schema.yml
  artifacts:
    paths:
      - shopur/schema.yml

security-scan:
  stage: security
  script:
    - bandit -r . -f txt -o bandit-report.txt
  artifacts:
    paths:
      - bandit-report.txt
    when: always
