stages:
  - build
  - lint
  - api
  - security

build-project:
  stage: build
  script:
    - cd shopur
    - python3 manage.py check
    - python3 manage.py makemigrations --check --dry-run

lint-project:
  stage: lint
  script:
    - mkdir -p artifacts
    - flake8 . --output-file=artifacts/flake8-report.txt
  artifacts:
    paths:
      - artifacts/flake8-report.txt
    when: always

generate-api-schema:
  stage: api
  script:
    - mkdir -p artifacts
    - cd shopur
    - python3 manage.py spectacular --file ../artifacts/schema.yml
  artifacts:
    paths:
      - artifacts/schema.yml
    when: always

security-scan:
  stage: security
  script:
    - mkdir -p artifacts
    - bandit -r . -f txt -o artifacts/bandit-report.txt
  artifacts:
    paths:
      - artifacts/bandit-report.txt
    when: always
