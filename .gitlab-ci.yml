stages:
  - build
  - lint
  - api
  - security

build-project:
  stage: build
  script:
    - echo "Проверка сборки Django проекта"
    - cd shopur
    - python manage.py check
    - python manage.py makemigrations --check --dry-run
    - echo "Сборка проекта успешна"

lint-project:
  stage: lint
  script:
    - echo "Проверка синтаксических ошибок (flake8)"
    - flake8 . --output-file=flake8-report.txt || true
    - cat flake8-report.txt
    - echo "Линтер завершил проверку"
  artifacts:
    paths:
      - flake8-report.txt
    expire_in: 7 days


generate-api-schema:
  stage: api
  script:
    - echo "Генерация схемы API интернет-магазина"
    - cd shopur
    - python manage.py spectacular --file schema.yml
    - echo "schema.yml создан"
  artifacts:
    paths:
      - shopur/schema.yml
    expire_in: 7 days

security-scan:
  stage: security
  script:
    - echo "Проверка безопасности кода проекта"
    - bandit -r . -f txt -o bandit-report.txt
    - echo "Отчет bandit создан"
  artifacts:
    paths:
      - bandit-report.txt
    expire_in: 7 days
